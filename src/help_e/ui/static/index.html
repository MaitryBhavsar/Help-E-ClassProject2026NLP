<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HELP-E demo</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #171c24;
    --panel-2: #1f2530;
    --border: #2a3140;
    --fg: #e6e8ec;
    --fg-dim: #8d95a3;
    --accent: #6aa1ff;
    --accent-2: #3b82f6;
    --user: #3b82f6;
    --assistant: #2b3444;
    --good: #5ec090;
    --warn: #e4b96c;
    --bad: #e66565;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--fg);
    font-size: 14px; line-height: 1.45;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    flex: 0 0 auto; z-index: 10;
  }
  header h1 { font-size: 15px; margin: 0 16px 0 0; font-weight: 600; letter-spacing: 0.2px; }
  header select, header button, header input {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font-size: 13px; font-family: inherit;
  }
  header select { min-width: 180px; }
  header button { cursor: pointer; }
  header button.primary { background: var(--accent-2); border-color: var(--accent-2); color: white; }
  header button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  header .status { margin-left: auto; color: var(--fg-dim); font-size: 12px; font-family: var(--mono); }
  header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); margin-right: 6px; vertical-align: middle; }
  header .status.ok .dot { background: var(--good); }
  header .status.bad .dot { background: var(--bad); }
  header .status.busy .dot { background: var(--warn); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  main {
    display: grid; grid-template-columns: minmax(320px, 44%) 1fr;
    flex: 1 1 auto; min-height: 0; overflow: hidden;
  }
  section.chat { display: flex; flex-direction: column; border-right: 1px solid var(--border); min-height: 0; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 14px 16px; overscroll-behavior: contain; }
  .msg { max-width: 82%; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--user); color: white; margin-left: auto; border-bottom-right-radius: 3px; }
  .msg.assistant { background: var(--assistant); border-bottom-left-radius: 3px; }
  .msg.assistant.fallback { border: 1px dashed var(--warn); }
  .msg .hint { font-size: 10px; color: var(--fg-dim); margin-top: 4px; font-family: var(--mono); }
  .msg.user .hint { color: rgba(255,255,255,0.7); text-align: right; }

  .composer { border-top: 1px solid var(--border); padding: 10px 12px; background: var(--panel); display: flex; gap: 8px; flex: 0 0 auto; align-items: center; }
  .composer textarea {
    flex: 1; resize: none; background: var(--panel-2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
    font-family: inherit; font-size: 13px; min-height: 38px; max-height: 140px;
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
  .composer button { background: var(--accent-2); color: white; border: none; border-radius: 6px; padding: 0 18px; cursor: pointer; font-size: 13px; font-weight: 600; height: 38px; }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .composer.agent { justify-content: flex-start; }
  .composer.agent button { flex: 1; padding: 0 20px; }
  .composer .agent-hint { color: var(--fg-dim); font-size: 11px; font-family: var(--mono); margin-left: 10px; }
  .msg.user.simulated { background: #4c3f6b; }
  .msg.user.simulated .hint { color: rgba(255,255,255,0.75); }
  .msg .sim-tag { display: inline-block; background: rgba(255,255,255,0.18); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; margin-bottom: 4px; letter-spacing: 0.3px; }

  section.debug { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .tabs { display: flex; gap: 2px; padding: 8px 10px 0 10px; background: var(--panel); border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .tab { background: transparent; color: var(--fg-dim); border: 1px solid transparent; padding: 6px 12px; font-size: 12px; cursor: pointer; border-radius: 4px 4px 0 0; border-bottom: none; font-family: inherit; }
  .tab.active { background: var(--bg); color: var(--fg); border-color: var(--border); border-bottom: 1px solid var(--bg); margin-bottom: -1px; }

  .turn-nav { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel-2); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--fg-dim); flex: 0 0 auto; }
  .turn-nav button { background: var(--panel); color: var(--fg); border: 1px solid var(--border); padding: 2px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .turn-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

  .panel-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 14px 16px; overscroll-behavior: contain; }
  .empty-state { color: var(--fg-dim); padding: 40px 16px; text-align: center; font-style: italic; }

  .kv { display: grid; grid-template-columns: 160px 1fr; gap: 6px 10px; margin-bottom: 12px; }
  .kv .k { color: var(--fg-dim); font-family: var(--mono); font-size: 11px; padding-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
  .kv .v { color: var(--fg); word-break: break-word; }
  .kv .v.mono { font-family: var(--mono); font-size: 12px; }
  .kv .v .badge { display: inline-block; background: var(--panel-2); color: var(--fg); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; margin-right: 4px; font-family: var(--mono); font-size: 11px; }
  .kv .v .badge.stage-precontemplation { border-color: #6b4c6b; color: #d8b3d8; }
  .kv .v .badge.stage-contemplation { border-color: #4c5f6b; color: #b3cdd8; }
  .kv .v .badge.stage-preparation { border-color: #4c6b5b; color: #b3d8c3; }
  .kv .v .badge.stage-action { border-color: #6b5b4c; color: #d8c3b3; }
  .kv .v .badge.stage-maintenance { border-color: #6b6b4c; color: #d8d8b3; }
  .kv .v .badge.main { background: var(--accent-2); color: white; border-color: var(--accent-2); }
  .kv .v .badge.fallback { border-color: var(--warn); color: var(--warn); }

  h3.section-title { font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--fg-dim); margin: 18px 0 8px 0; border-bottom: 1px solid var(--border); padding-bottom: 4px; }

  pre {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px; font-family: var(--mono); font-size: 11.5px;
    white-space: pre-wrap; word-wrap: break-word; overflow-x: auto; margin: 0;
    color: var(--fg);
  }
  .instruction-box { background: var(--panel-2); border-left: 3px solid var(--accent); padding: 8px 10px; border-radius: 3px; margin-bottom: 8px; font-size: 12.5px; white-space: pre-wrap; }
  .intent-box { background: var(--panel-2); border-left: 3px solid var(--good); padding: 8px 10px; border-radius: 3px; margin-bottom: 8px; font-size: 12.5px; }
  .elapsed-tag { color: var(--fg-dim); font-family: var(--mono); font-size: 11px; margin-left: 8px; }

  details.collapsible { margin-bottom: 8px; }
  details.collapsible summary { cursor: pointer; color: var(--fg-dim); font-family: var(--mono); font-size: 11px; padding: 4px 0; text-transform: uppercase; letter-spacing: 0.4px; }
  details.collapsible summary:hover { color: var(--fg); }
  details.collapsible[open] summary { color: var(--fg); }

  .evidence-item { padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; background: var(--panel); }
  .evidence-item .et { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-right: 6px; }
  .evidence-item .ev { font-family: var(--mono); font-size: 11px; color: var(--fg); }
  .evidence-item .info { color: var(--fg-dim); font-size: 12px; margin-top: 4px; }
  .evidence-item .probs .p { background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; margin-right: 3px; }

  .candidate-chip { display: inline-block; background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; margin: 0 4px 4px 0; font-family: var(--mono); font-size: 11px; }
  .candidate-chip.chosen { border-color: var(--accent); background: var(--accent); color: white; }

  .profile-blurb { padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel-2); font-size: 12.5px; color: var(--fg-dim); margin-bottom: 14px; }
  .profile-blurb strong { color: var(--fg); }
</style>
</head>
<body>

<header>
  <h1>HELP-E</h1>
  <label>System <select id="system-sel"></select></label>
  <label>Profile <select id="profile-sel"></select></label>
  <label>User <select id="mode-sel" title="Who generates the user side of the conversation">
    <option value="human">Me (type)</option>
    <option value="agent">Profile agent (Mind-1)</option>
  </select></label>
  <button id="new-btn" class="primary">New conversation</button>
  <div id="status" class="status"><span class="dot"></span><span class="text">idle</span></div>
</header>

<main>
  <section class="chat">
    <div id="messages" class="messages">
      <div class="empty-state">Pick a system + profile, then click <em>New conversation</em>.</div>
    </div>
    <div class="composer" id="composer-human">
      <textarea id="composer-text" placeholder="Say something..." disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
    <div class="composer agent" id="composer-agent" style="display: none;">
      <button id="agent-btn" class="primary" disabled>Generate next user turn</button>
      <span class="agent-hint">Profile agent speaks via Mind-1</span>
    </div>
  </section>

  <section class="debug">
    <div class="tabs">
      <button class="tab active" data-tab="summary">Summary</button>
      <button class="tab" data-tab="extraction">Extraction</button>
      <button class="tab" data-tab="bundle">Bundle</button>
      <button class="tab" data-tab="graph">Graph</button>
      <button class="tab" data-tab="raw">Raw</button>
    </div>
    <div class="turn-nav">
      <button id="prev-turn">&larr;</button>
      <span id="turn-label">no turns yet</span>
      <button id="next-turn">&rarr;</button>
      <button id="latest-turn" style="margin-left: auto;">Latest</button>
    </div>
    <div id="panel-body" class="panel-body">
      <div class="empty-state">Send a message to see the internal state.</div>
    </div>
  </section>
</main>

<script>
(() => {
  const $ = (s) => document.querySelector(s);

  const state = {
    conversationId: null,
    system: null,
    profileId: null,
    mode: "human",     // "human" or "agent"
    turns: [],         // turn payloads, in order
    viewIdx: -1,       // which turn the debug panel is showing
    activeTab: "summary",
    busy: false,
  };

  const statusEl = $("#status");
  const setStatus = (cls, text) => {
    statusEl.className = "status " + cls;
    statusEl.querySelector(".text").textContent = text;
  };

  async function api(method, path, body) {
    const opt = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opt.body = JSON.stringify(body);
    const r = await fetch(path, opt);
    if (!r.ok) {
      let err;
      try { err = (await r.json()).error; } catch { err = r.statusText; }
      throw new Error(err || `HTTP ${r.status}`);
    }
    return r.json();
  }

  // ---------- bootstrap ----------
  async function bootstrap() {
    try {
      const [sys, prof] = await Promise.all([
        api("GET", "/api/systems"),
        api("GET", "/api/profiles"),
      ]);
      const sysSel = $("#system-sel");
      sys.systems.forEach((s) => {
        const o = document.createElement("option");
        o.value = s.id; o.textContent = s.label;
        o.title = s.description;
        sysSel.appendChild(o);
      });
      sysSel.value = "v6";

      const profSel = $("#profile-sel");
      if (prof.profiles.length === 0) {
        const o = document.createElement("option");
        o.value = ""; o.textContent = "(no profiles found)";
        o.disabled = true;
        profSel.appendChild(o);
      } else {
        prof.profiles.forEach((p) => {
          const o = document.createElement("option");
          o.value = p.profile_id;
          o.textContent = `${p.profile_id} — ${p.primary_problem}`;
          o.title = p.blurb;
          profSel.appendChild(o);
        });
      }

      // Health probe
      try {
        const h = await api("GET", "/api/health");
        const mainOk = h.ollama_reachable?.main;
        const simOk = h.ollama_reachable?.sim;
        setStatus(mainOk ? "ok" : "bad",
          `main ${mainOk ? "ok" : "unreachable"} · sim ${simOk ? "ok" : "unreachable"}`);
      } catch {
        setStatus("bad", "health probe failed");
      }
    } catch (e) {
      setStatus("bad", `bootstrap: ${e.message}`);
    }
  }

  // ---------- new conversation ----------
  async function newConversation() {
    const system = $("#system-sel").value;
    const profile_id = $("#profile-sel").value;
    const mode = $("#mode-sel").value;
    if (!profile_id) return;
    setStatus("busy", "creating conversation...");
    try {
      const r = await api("POST", "/api/conversations", { system, profile_id, mode });
      state.conversationId = r.conversation_id;
      state.system = r.system;
      state.profileId = r.profile_id;
      state.mode = r.mode || "human";
      state.turns = [];
      state.viewIdx = -1;
      renderMessages(r);
      renderPanel();
      applyModeUI();
      setStatus("ok", `ready · ${r.system} · ${r.profile_id} · ${state.mode === "agent" ? "agent-driven" : "human-driven"}`);
    } catch (e) {
      setStatus("bad", `new: ${e.message}`);
    }
  }

  function applyModeUI() {
    const human = $("#composer-human");
    const agent = $("#composer-agent");
    if (state.mode === "agent") {
      human.style.display = "none";
      agent.style.display = "flex";
      $("#agent-btn").disabled = false;
      $("#agent-btn").focus();
    } else {
      human.style.display = "flex";
      agent.style.display = "none";
      $("#composer-text").disabled = false;
      $("#send-btn").disabled = false;
      $("#composer-text").focus();
    }
  }

  // ---------- send message (human mode) ----------
  async function sendMessage() {
    const text = $("#composer-text").value.trim();
    if (!text || state.busy || !state.conversationId) return;
    setBusy(true);
    setStatus("busy", "processing turn — this can take a few minutes...");
    appendMessage("user", text);
    $("#composer-text").value = "";

    try {
      const t0 = performance.now();
      const payload = await api("POST", `/api/conversations/${state.conversationId}/messages`, { message: text });
      const elapsedMs = performance.now() - t0;
      state.turns.push(payload);
      state.viewIdx = state.turns.length - 1;
      appendMessage("assistant", payload.assistant_response || "(empty response)", { fallback: payload.fallback_default, elapsedS: payload.elapsed_s });
      renderPanel();
      setStatus("ok", `turn ${payload.turn_id} done in ${payload.elapsed_s}s (round-trip ${(elapsedMs/1000).toFixed(1)}s)`);
    } catch (e) {
      appendMessage("assistant", `(error: ${e.message})`, { fallback: true });
      setStatus("bad", `turn failed: ${e.message}`);
    } finally {
      setBusy(false);
    }
  }

  // ---------- agent reply (agent mode) ----------
  async function agentReply() {
    if (state.busy || !state.conversationId) return;
    setBusy(true);
    setStatus("busy", "Mind-1 generating user turn, then running the system...");

    try {
      const t0 = performance.now();
      const payload = await api("POST", `/api/conversations/${state.conversationId}/agent_reply`);
      const elapsedMs = performance.now() - t0;
      state.turns.push(payload);
      state.viewIdx = state.turns.length - 1;
      appendMessage("user", payload.user_message || "(empty)", { simulated: true });
      appendMessage("assistant", payload.assistant_response || "(empty response)", { fallback: payload.fallback_default, elapsedS: payload.elapsed_s });
      renderPanel();
      setStatus("ok", `turn ${payload.turn_id} done in ${payload.elapsed_s}s (round-trip ${(elapsedMs/1000).toFixed(1)}s)`);
    } catch (e) {
      appendMessage("assistant", `(error: ${e.message})`, { fallback: true });
      setStatus("bad", `agent reply failed: ${e.message}`);
    } finally {
      setBusy(false);
    }
  }

  function setBusy(busy) {
    state.busy = busy;
    $("#send-btn").disabled = busy;
    $("#composer-text").disabled = busy;
    $("#agent-btn").disabled = busy;
    if (!busy) {
      if (state.mode === "agent") $("#agent-btn").focus();
      else $("#composer-text").focus();
    }
  }

  // ---------- render: chat messages ----------
  function renderMessages(convMeta) {
    const box = $("#messages");
    box.innerHTML = "";
    const blurb = document.createElement("div");
    blurb.className = "profile-blurb";
    blurb.innerHTML = `<strong>${convMeta.profile_id}</strong> · primary problem: <em>${convMeta.primary_problem}</em><br>` +
      `System: <strong>${convMeta.system_label}</strong><br>` +
      `Arc cue (session 1): <em>${escapeHtml(convMeta.session_arc_cue || "—")}</em><br>` +
      `<span style="color: var(--fg-dim); font-size: 11px;">${escapeHtml(convMeta.profile_blurb || "")}</span>`;
    box.appendChild(blurb);
  }

  function appendMessage(role, text, opts) {
    opts = opts || {};
    const box = $("#messages");
    const empty = box.querySelector(".empty-state");
    if (empty) empty.remove();
    const m = document.createElement("div");
    m.className = "msg " + role + (opts.fallback ? " fallback" : "") + (opts.simulated ? " simulated" : "");
    if (opts.simulated) {
      const tag = document.createElement("div");
      tag.className = "sim-tag";
      tag.textContent = "Mind-1 · simulated";
      m.appendChild(tag);
    }
    const body = document.createElement("div");
    body.textContent = text;
    m.appendChild(body);
    if (opts.elapsedS != null) {
      const h = document.createElement("div");
      h.className = "hint";
      h.textContent = `${opts.elapsedS.toFixed ? opts.elapsedS.toFixed(1) : opts.elapsedS}s${opts.fallback ? " · fallback" : ""}`;
      m.appendChild(h);
    }
    box.appendChild(m);
    box.scrollTop = box.scrollHeight;
  }

  // ---------- render: debug panel ----------
  function renderPanel() {
    const nav = $("#turn-label");
    if (state.turns.length === 0) {
      nav.textContent = "no turns yet";
      $("#prev-turn").disabled = $("#next-turn").disabled = $("#latest-turn").disabled = true;
      $("#panel-body").innerHTML = '<div class="empty-state">Send a message to see the internal state.</div>';
      return;
    }
    if (state.viewIdx < 0 || state.viewIdx >= state.turns.length) state.viewIdx = state.turns.length - 1;
    const turn = state.turns[state.viewIdx];
    nav.textContent = `turn ${turn.turn_id} of ${state.turns.length}`;
    $("#prev-turn").disabled = state.viewIdx <= 0;
    $("#next-turn").disabled = state.viewIdx >= state.turns.length - 1;
    $("#latest-turn").disabled = state.viewIdx === state.turns.length - 1;

    const body = $("#panel-body");
    if (state.activeTab === "summary") body.innerHTML = renderSummary(turn);
    else if (state.activeTab === "extraction") body.innerHTML = renderExtraction(turn);
    else if (state.activeTab === "bundle") body.innerHTML = renderBundle(turn);
    else if (state.activeTab === "graph") body.innerHTML = renderGraph(turn);
    else body.innerHTML = renderRaw(turn);
  }

  function renderSummary(turn) {
    const ttmBadges = Object.entries(turn.ttm_stages || {})
      .map(([p, stage]) =>
        `<div style="margin-bottom: 4px;"><span class="badge ${p === turn.main_problem ? 'main' : ''}">${escapeHtml(p)}</span> <span class="badge stage-${escapeHtml(stage)}">${escapeHtml(stage)}</span></div>`
      ).join("") || '<span style="color: var(--fg-dim);">(no problems tracked)</span>';

    const active = (turn.active_problems || []).map(p =>
      `<span class="badge ${p === turn.main_problem ? 'main' : ''}">${escapeHtml(p)}</span>`
    ).join(" ") || '<span style="color: var(--fg-dim);">(none)</span>';

    const cands = (turn.candidates || []).map(c => {
      const chosen = (turn.chosen_techniques || []).includes(c.technique_id);
      return `<span class="candidate-chip ${chosen ? 'chosen' : ''}">${escapeHtml(c.technique_id)} ${escapeHtml(c.technique_label)}</span>`;
    }).join(" ") || '<span style="color: var(--fg-dim);">(no candidates emitted)</span>';

    const chosen = (turn.chosen_techniques || []).map(t => `<span class="candidate-chip chosen">${escapeHtml(t)}</span>`).join(" ") || '<span style="color: var(--fg-dim);">(none)</span>';

    const ttmUpdates = (turn.ttm_updates || []).map(u => {
      if (!u.is_change) return null;
      return `<div class="evidence-item"><span class="et">${escapeHtml(u.problem_name)}</span>: <span class="ev">${escapeHtml(u.current_ttm_stage)} → ${escapeHtml(u.new_ttm_stage)}</span><div class="info">${escapeHtml(u.rationale || "")}</div></div>`;
    }).filter(Boolean).join("") || '<span style="color: var(--fg-dim);">(no TTM updates this turn)</span>';

    const isV6 = turn.variant === "v6";
    const v6 = turn.v6 || {};
    const ts = v6.three_sources || {};
    const renderSourceList = (arr) => {
      if (!arr || !arr.length) return '<span style="color: var(--fg-dim);">(none)</span>';
      return arr.map(c => `<span class="candidate-chip">${escapeHtml(c.technique_id)} ${escapeHtml(c.technique_label)}</span>`).join(" ");
    };
    const threeSourcesBlock = isV6 ? `
      <h3 class="section-title">Three-source MI candidate streams (v6)</h3>
      <div class="kv">
        <div class="k">From user intent</div><div class="v">${renderSourceList(ts.from_user_intent)}</div>
        <div class="k">From TTM stage</div><div class="v">${renderSourceList(ts.from_ttm_stage)}</div>
        <div class="k">From attr levels</div><div class="v">${renderSourceList(ts.from_attribute_levels)}</div>
      </div>
    ` : "";

    // v6 redesign: `system_intent` and `response_reasoning` were
    // collapsed into a single `reasoning` string that walks 4 steps
    // (Who-am-I + intent → Which strategies → Evidence-for-help-or-
    // understanding → Entry). The server adapter mirrors `reasoning`
    // into both `turn.system_intent` and `turn.instruction` for
    // back-compat, so we render only one panel for v6 with the new
    // label.
    const instructionLabel = isV6
      ? "Reasoning (v6 — who I am + intent + help/understanding + entry)"
      : "Instruction (§6.7)";
    const instructionText = isV6
      ? (v6.response_reasoning || v6.reasoning || turn.instruction || turn.system_intent || "")
      : (turn.instruction || "");

    // v6 redesign: render `evidence_used` — pairs of {source, content}
    // showing what HELPS the user or what the assistant ACKNOWLEDGED
    // so they feel understood. Empty list is acceptable on
    // small_talk / cold-start turns.
    const evidenceUsed = (v6.evidence_used || turn.evidence_used || []);
    const evidenceUsedBlock = isV6 ? `
      <h3 class="section-title">Evidence used (v6 — what helps / what shows understanding)</h3>
      ${evidenceUsed.length === 0
        ? '<span style="color: var(--fg-dim);">(none — common on small_talk / cold-start turns)</span>'
        : evidenceUsed.map(e => `
            <div class="evidence-item">
              <div><span class="et">${escapeHtml(e.source || "")}</span></div>
              <div class="info">${escapeHtml(e.content || "")}</div>
            </div>`).join("")}
    ` : "";

    // v6 redesign: there is no separate "system_intent" panel anymore;
    // for v1–v5 we still show the legacy field.
    const systemIntentBlock = isV6 ? "" : `
      <h3 class="section-title">System intent (§6.12)</h3>
      <div class="intent-box">${escapeHtml(turn.system_intent || '(not emitted)')}</div>
    `;

    return `
      <div class="kv">
        <div class="k">Turn</div><div class="v">${turn.turn_id} <span class="elapsed-tag">${turn.elapsed_s}s${turn.fallback_default ? ' · fallback' : ''}</span>${isV6 ? ' <span class="badge">v6</span>' : ''}</div>
        <div class="k">User message</div><div class="v">${escapeHtml(turn.user_message)}</div>
        <div class="k">User intent</div><div class="v"><span class="badge">${escapeHtml(turn.user_intent || 'n/a')}</span></div>
        <div class="k">Main problem</div><div class="v">${turn.main_problem ? `<span class="badge main">${escapeHtml(turn.main_problem)}</span>` : '<span style="color: var(--fg-dim);">(none)</span>'}${turn.carried_forward_main ? '<span class="badge" style="margin-left: 6px;">carried forward</span>' : ''}${turn.empty_turn ? '<span class="badge" style="margin-left: 6px;">empty turn</span>' : ''}</div>
        <div class="k">Active problems</div><div class="v">${active}</div>
      </div>

      ${systemIntentBlock}

      <h3 class="section-title">${instructionLabel}</h3>
      <div class="instruction-box">${escapeHtml(instructionText || '(not emitted)')}</div>

      ${evidenceUsedBlock}

      <h3 class="section-title">MI techniques</h3>
      <div class="kv">
        <div class="k">Candidates${isV6 ? ' (union)' : ''}</div><div class="v">${cands}</div>
        <div class="k">Chosen</div><div class="v">${chosen}</div>
      </div>
      ${threeSourcesBlock}

      <h3 class="section-title">TTM stages (current graph state)</h3>
      <div style="margin-bottom: 12px;">${ttmBadges}</div>

      <h3 class="section-title">TTM updates this turn</h3>
      ${ttmUpdates}

      <h3 class="section-title">Assistant response</h3>
      <pre>${escapeHtml(turn.assistant_response || '')}</pre>
    `;
  }

  function renderExtraction(turn) {
    const ex = turn.extraction || {};
    if (ex._baseline_placeholder) {
      return `<div class="empty-state">${state.system} is a baseline — extraction is a placeholder (no attribute graph, no HBM).</div>`;
    }
    const observed = (ex.observed_attributes || []).map(e => `
      <div class="evidence-item">
        <div><span class="et">${escapeHtml(e.attr_type)}</span> <span class="p">${escapeHtml(e.problem || "")}</span></div>
        <div class="info">${escapeHtml(e.value || "")}</div>
      </div>`).join("") || '<span style="color: var(--fg-dim);">(no observed attributes this turn)</span>';

    if (turn.variant === "v6") {
      const v6 = turn.v6 || {};
      const inf = v6.inference || {};
      const rc = v6.recompute || {};
      const cooc = (inf.problem_cooccurrence_connections || []).map(c =>
        `<div class="evidence-item"><span class="et">${escapeHtml(c.problem_1)}</span> ↔ <span class="et">${escapeHtml(c.problem_2)}</span><div class="info">${escapeHtml(c.concise_explanation || "")}</div></div>`
      ).join("") || '<span style="color: var(--fg-dim);">(none)</span>';
      const attrConn = (inf.problem_attribute_connections || []).map(c =>
        `<div class="evidence-item"><span class="et">${escapeHtml(c.problem_1)}.${escapeHtml(c.attribute_1)}</span> —${escapeHtml(c.relation_type)}→ <span class="et">${escapeHtml(c.problem_2)}.${escapeHtml(c.attribute_2)}</span><div class="info">${escapeHtml(c.connection_explanation || "")}</div></div>`
      ).join("") || '<span style="color: var(--fg-dim);">(none)</span>';
      const levelUpdates = (rc.attribute_level_updates || []).map(u =>
        `<div class="evidence-item"><span class="et">${escapeHtml(u.problem_name)}.${escapeHtml(u.attribute_name)}</span>: <span class="ev">${escapeHtml(u.old_level)} → ${escapeHtml(u.new_level)}</span><div class="info">${escapeHtml(u.reasoning || "")}</div></div>`
      ).join("") || '<span style="color: var(--fg-dim);">(no level updates)</span>';
      return `
        <h3 class="section-title">Observed attributes (v6 inference)</h3>
        ${observed}
        <h3 class="section-title">Problem co-occurrence connections</h3>
        ${cooc}
        <h3 class="section-title">Problem–attribute connections</h3>
        ${attrConn}
        <h3 class="section-title">Level recompute updates</h3>
        ${levelUpdates}
        <details class="collapsible">
          <summary>raw inference JSON</summary>
          <pre>${escapeHtml(JSON.stringify(inf, null, 2))}</pre>
        </details>
        <details class="collapsible">
          <summary>raw recompute JSON</summary>
          <pre>${escapeHtml(JSON.stringify(rc, null, 2))}</pre>
        </details>
      `;
    }

    return `
      <h3 class="section-title">Observed attributes (this turn)</h3>
      ${observed}
      <h3 class="section-title">Raw extraction JSON</h3>
      <pre>${escapeHtml(JSON.stringify(ex, null, 2))}</pre>
    `;
  }

  function renderBundle(turn) {
    if (!turn.bundle) {
      return `<div class="empty-state">${state.system} does not emit a retrieval bundle.</div>`;
    }
    return `<pre>${escapeHtml(JSON.stringify(turn.bundle, null, 2))}</pre>`;
  }

  function renderGraph(turn) {
    const g = turn.graph_snapshot || {};
    if (turn.variant === "v6" || (g.problems && !Array.isArray(g.problems))) {
      return renderGraphV6(turn, g);
    }
    const stats = g.stats || {};
    const problems = (g.problems || []).map(p =>
      `<div class="evidence-item">
        <span class="et">${escapeHtml(p.problem_name)}</span>
        <span class="badge stage-${escapeHtml(p.current_ttm_stage)}">${escapeHtml(p.current_ttm_stage)}</span>
        <span class="info">first=(${p.first_mentioned}) last=(${p.last_mentioned})</span>
      </div>`
    ).join("");
    const edges = (g.edges || []).map(e => {
      const attr = (g.attributes || []).find(a => a.id === e.attr_id);
      const prob = (g.problems || []).find(pr => pr.id === e.problem_id);
      return `<div class="evidence-item">
        <span class="et">${escapeHtml(attr ? attr.attr_type : e.attr_id)}</span>
        <span class="ev">${escapeHtml(attr ? attr.value : "?")}</span>
        <span class="badge">${escapeHtml(e.current_level)}</span>
        <span class="info">→ ${escapeHtml(prob ? prob.problem_name : e.problem_id)} (w=${e.weight}, stack=${(e.information_stack || []).length})</span>
      </div>`;
    }).join("") || '<span style="color: var(--fg-dim);">(no attribute edges yet)</span>';

    return `
      <h3 class="section-title">Stats</h3>
      <div class="kv">
        <div class="k">Problems</div><div class="v mono">${stats.num_problems || 0}</div>
        <div class="k">Attributes</div><div class="v mono">${stats.num_attributes || 0}</div>
        <div class="k">Edges</div><div class="v mono">${stats.num_edges || 0}</div>
      </div>
      <h3 class="section-title">Problems</h3>
      ${problems || '<span style="color: var(--fg-dim);">(none)</span>'}
      <h3 class="section-title">Attribute edges</h3>
      ${edges}
      <details class="collapsible">
        <summary>full graph JSON</summary>
        <pre>${escapeHtml(JSON.stringify(g, null, 2))}</pre>
      </details>
    `;
  }

  function renderGraphV6(turn, g) {
    const problemEntries = Object.entries(g.problems || {});
    const edges = g.edges || [];
    const persona = g.persona || {};

    const problems = problemEntries.map(([name, p]) => {
      const levelAttrs = Object.entries(p.level_attributes || {}).map(([a, st]) =>
        `<div class="info" style="margin-left: 8px;"><span class="et">${escapeHtml(a)}</span> <span class="badge">${escapeHtml(st.current_level || "unknown")}</span> <span class="info">(stack=${(st.evidence_stack || []).length})</span></div>`
      ).join("");
      const nonLevelAttrs = Object.entries(p.non_level_attributes || {}).map(([a, st]) =>
        `<div class="info" style="margin-left: 8px;"><span class="et">${escapeHtml(a)}</span> <span class="info">(stack=${(st.evidence_stack || []).length})</span></div>`
      ).join("");
      const goal = p.goal ? `<div class="info" style="margin-left: 8px;">goal: ${escapeHtml(p.goal)}</div>` : "";
      return `<div class="evidence-item">
        <div>
          <span class="et">${escapeHtml(name)}</span>
          <span class="badge stage-${escapeHtml(p.current_ttm_stage)}">${escapeHtml(p.current_ttm_stage)}</span>
          <span class="info">first=(${(p.first_mentioned || []).join(",")}) last=(${(p.last_mentioned || []).join(",")})</span>
        </div>
        ${goal}
        ${levelAttrs || '<div class="info" style="margin-left: 8px; color: var(--fg-dim);">(no level attrs)</div>'}
        ${nonLevelAttrs}
      </div>`;
    }).join("") || '<span style="color: var(--fg-dim);">(no problems yet — cold start)</span>';

    const edgeList = edges.map(e => {
      const coocN = (e.cooccurrence_entries || []).length;
      const attrConnN = (e.attribute_connection_entries || []).length;
      const relations = (e.attribute_connection_entries || [])
        .map(c => `<div class="info" style="margin-left: 8px;">${escapeHtml(c.attribute_1)}—${escapeHtml(c.relation_type)}→${escapeHtml(c.attribute_2)} <span class="info">(${escapeHtml(c.confidence)})</span></div>`)
        .join("");
      return `<div class="evidence-item">
        <span class="et">${escapeHtml(e.problem_1)}</span> ↔ <span class="et">${escapeHtml(e.problem_2)}</span>
        <span class="badge">w=${(e.weight || 0).toFixed ? e.weight.toFixed(3) : e.weight}</span>
        <span class="info">cooc=${coocN} · attr-conn=${attrConnN}</span>
        ${relations}
      </div>`;
    }).join("") || '<span style="color: var(--fg-dim);">(no problem-problem edges yet)</span>';

    const personaRows = Object.entries(persona).map(([k, v]) => {
      const txt = Array.isArray(v) ? (v.join(", ") || "—") : (v || "—");
      return `<div class="kv"><div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(txt)}</div></div>`;
    }).join("");

    const v6 = turn.v6 || {};
    const ctx = v6.session_context || {};
    const ctxRows = Object.keys(ctx).length ? `
      <h3 class="section-title">Session context (simulator-only)</h3>
      <div class="kv">
        <div class="k">Life events</div><div class="v">${escapeHtml(ctx.current_life_events || "")}</div>
        <div class="k">Mental state</div><div class="v">${escapeHtml(ctx.mental_state || "")}</div>
        <div class="k">Mood</div><div class="v">${escapeHtml(ctx.mood || "")}</div>
        <div class="k">Emotions</div><div class="v">${escapeHtml((ctx.emotions || []).join(", "))}</div>
        <div class="k">Resistance</div><div class="v">${escapeHtml(ctx.resistance_cooperation_level || "")}</div>
        <div class="k">Active problems</div><div class="v">${escapeHtml((ctx.currently_active_problems || []).join(", "))}</div>
        <div class="k">Why now</div><div class="v">${escapeHtml(ctx.why_bringing_these_up_now || "")}</div>
      </div>` : "";

    return `
      <h3 class="section-title">Stats</h3>
      <div class="kv">
        <div class="k">Problems</div><div class="v mono">${problemEntries.length}</div>
        <div class="k">Edges</div><div class="v mono">${edges.length}</div>
        <div class="k">Cooc added</div><div class="v mono">${v6.cooc_added || 0}</div>
        <div class="k">Attr-conn added</div><div class="v mono">${v6.attr_conn_added || 0}</div>
      </div>
      <h3 class="section-title">Problems (attributes live inside)</h3>
      ${problems}
      <h3 class="section-title">Problem–problem edges</h3>
      ${edgeList}
      ${ctxRows}
      <h3 class="section-title">Persona (filled by session-end updates)</h3>
      ${personaRows || '<span style="color: var(--fg-dim);">(persona empty — filled at session end)</span>'}
      <details class="collapsible">
        <summary>full graph JSON</summary>
        <pre>${escapeHtml(JSON.stringify(g, null, 2))}</pre>
      </details>
    `;
  }

  function renderRaw(turn) {
    return `<pre>${escapeHtml(JSON.stringify(turn, null, 2))}</pre>`;
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
    }[ch]));
  }

  // ---------- events ----------
  $("#new-btn").addEventListener("click", newConversation);
  $("#send-btn").addEventListener("click", sendMessage);
  $("#agent-btn").addEventListener("click", agentReply);
  $("#composer-text").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b === btn));
      renderPanel();
    });
  });
  $("#prev-turn").addEventListener("click", () => { if (state.viewIdx > 0) { state.viewIdx--; renderPanel(); } });
  $("#next-turn").addEventListener("click", () => { if (state.viewIdx < state.turns.length - 1) { state.viewIdx++; renderPanel(); } });
  $("#latest-turn").addEventListener("click", () => { state.viewIdx = state.turns.length - 1; renderPanel(); });

  bootstrap();
})();
</script>
</body>
</html>
