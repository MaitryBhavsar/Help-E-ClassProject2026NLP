seed_situation_paragraph: Throughout high school, I was targeted for my love of reading and
  interest in science fiction. My peers nicknamed me "Bookworm" and frequently vandalized
  my locker, leaving torn pages from books inside. In the cafeteria, they would surround my
  table, snatching my books and taunting me with spoilers or fake endings
